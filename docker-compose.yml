version: '3.8'

services:
  nightbite:
    build: .
    container_name: nightbite
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    networks:
      - nightbite

  redis:
    image: redis:7-alpine
    container_name: nightbite-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - nightbite

volumes:
  redis_data:

networks:
  nightbite:
    driver: bridge
